<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color:rgb(158, 211, 220);
        }
        main{
            width: 600px;
            height: 600px;
            box-shadow: 0px 0px 10px black;
            margin: 90px auto;
            text-align: center;
            background-color: whitesmoke;
             animation-name: ani;
            animation-duration: 8s;
            animation-iteration-count: infinite;
            border-radius: 15px;
            
        }
        #myform{
               display: flex;
               flex-direction: column;
               padding: 15px;
             align-items: center;
             background-color: whitesmoke;
              animation-name: ani;
            animation-duration: 8s;
            animation-iteration-count: infinite;
            border-radius: 16px;
        }
        input{
            height: 30px;
            width: 60%;
            background-color: white;
            border-radius: 4px;
            
        }
        label{
            font-size: x-large;
            background-color: whitesmoke;
             animation-name: ani;
            animation-duration: 8s;
            animation-iteration-count: infinite;
        }
        input:hover{
            transform: scale(1.07);
           
        }
         @keyframes ani {
            0% {
                background-color: yellowgreen;
                border-color: gold;
            }
            25% {
                background-color: aqua;
                border-color: burlywood;
            }
            50% {
                background-color: pink;
                border-color: chartreuse;
            }
            75% {
                background-color: brown;
                border-color: chocolate;
            }
            100% {
                background-color: blue;
                font-style: italic;
            }
        }
    </style>
</head>
<body>
    <main>
        <form id="myform"  onsubmit="validate()">
            <label>First Name</label>
            <input type="text" name="fname" placeholder="Enter First Name"
            id="fname">
            <br><br>
            <label>Last Name</label>
            <input type="text" name="lname" placeholder="Enter Last Name"
            id="lname">
            <br><br>
            <label>Email</label>
            <input type="email" name="lname" placeholder="Enter Your Email id"
            id="email">
            <br><br>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password"
            id="password">
            <br><br>
            <label>Confirm Password</label>
            <input type="password" name="cnfpassword" placeholder="Enter password" 
            id="cnfpassword">
            <br><br>
            <input type="submit" >
        </form>
    </main>
    <script>
    

                    function validate(){
                           let fname = document.getElementById('fname').value;
         let lname = document.getElementById('lname').value;
            let email = document.getElementById('email').value;
                let password = document.getElementById('password').value;
                    let cnfpassword = document.getElementById('cnfpassword').value;
if(fname === "" || lname === "" || email === "" || password === "" || cnfpassword === ""){
                            alert("All fields are required")
                        }
                        else if(password != cnfpassword){
                            alert("Password and confirm password should be same")
                        }
                        else{
                            alert("Form submitted successfully")
                        }
                    }
    </script>
  
</body>
</html>
