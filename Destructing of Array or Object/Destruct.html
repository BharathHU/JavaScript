<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Destructing of Array or Object</h1>
    <script>
        var obj={
            name:"Bharath",
            age:22,
            city:"Bengaluru",
            gender:"male"
        }
        //old approch
        var name=obj.name
        var age=obj.age
        var city=obj.city
        var gender=obj.gender
        console.log(name)
        console.log(age)
         console.log(city)
         console.log(gender)
        //new approch
        const{name,age,city,gender}=obj
         console.log(name)
        console.log(age)
        console.log(city)

    </script>
</body>
</html>
