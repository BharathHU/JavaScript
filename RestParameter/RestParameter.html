<!-- Rest Parameter allow a function to accept an indefinite number of argument as an array
and also it can applied for array or object to store elements or properties.
Syntax:
function myfun(...args){
console.log(args)
} -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function greet(greeting,...names){
            for (let name of names){
                console.log(`${greeting},${name}`)
            }
        }
        greet('hello','Bharath Nishchitha','Chaluva','Ujwal','Vishal','Chandan')
        greet('Good Morning','Bharath')
    </script>
</body>
</html>
