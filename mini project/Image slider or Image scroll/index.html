<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Slider & Image Scroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- IMAGE SLIDER -->
  <div class="slider-container">

    <div class="slider">
      <img src="https://picsum.photos/id/1015/900/500" class="slide active">
      <img src="https://picsum.photos/id/1016/900/500" class="slide">
      <img src="https://picsum.photos/id/1018/900/500" class="slide">
      <img src="https://picsum.photos/id/1020/900/500" class="slide">
    </div>

    <button class="prev">&#10094;</button>
    <button class="next">&#10095;</button>

  </div>

  <!-- IMAGE SCROLL -->
  <h2 class="title">Image Scroll Gallery</h2>

  <div class="scroll-gallery">

    <img src="https://picsum.photos/id/1025/300/200">
    <img src="https://picsum.photos/id/1035/300/200">
    <img src="https://picsum.photos/id/1040/300/200">
    <img src="https://picsum.photos/id/1050/300/200">
    <img src="https://picsum.photos/id/1060/300/200">
    <img src="https://picsum.photos/id/1070/300/200">

  </div>

  <script src="script.js"></script>
</body>
</html>
