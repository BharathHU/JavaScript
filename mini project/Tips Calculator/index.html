<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Tip Calculator</h1>

    <div class="input-box">
      <label>Bill Amount</label>
      <input type="number" id="billAmount" placeholder="Enter bill amount">
    </div>

    <div class="input-box">
      <label>Tip Percentage (%)</label>
      <input type="number" id="tipPercentage" placeholder="Enter tip percentage">
    </div>

    <div class="input-box">
      <label>Discount (%)</label>
      <input type="number" id="discountPercentage" placeholder="Enter discount percentage">
    </div>

    <button onclick="calculateTip()">Calculate</button>

    <div class="result">
      <h3>Tip Amount: ₹<span id="tipAmount">0</span></h3>
      <h3>Discount Amount: ₹<span id="discountAmount">0</span></h3>
      <h3>Total Bill: ₹<span id="totalBill">0</span></h3>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
