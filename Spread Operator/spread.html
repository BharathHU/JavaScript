<!-- it is used to copy properties of one object into another object into another object and it
is used to copy elements of one array into array, -->
<!-- Syntax: -->
<!-- # ...<object name>
#...<Array name> -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
  var obj1={
    name:"Bharath",
    age:22,
    city:"Bengaluru"
  }
  console.log(obj1)
  var obj2={
    ...obj1,
    gender:"Male",
    weight:"180cm",
    id:7,
    email:"bharathhu@gmail.com"

  }
  console.log(obj2)

  var num1=[1,2,3,4,5]
  console.log(num1)

  var num2=[...num1,6,7,8,9]
  console.log(num2)
    </script>
</body>
</html>
