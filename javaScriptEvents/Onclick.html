<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #btn1,#btn2{
            background-color: yellowgreen;
            border-radius: 5px;
            display: flexbox;
            margin: 10px 30px;
            
        }
        #btn1,#btn2:hover{
            background-color: pink;
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <h1>Onclick Method</h1>
    <button onclick="generatepara()" id="btn1">Click me</button>
    <button onclick="img()" id="btn2">GenerateImg</button>
    <script>
        function generatepara(){
            let para=document.createElement('p')
            para.textContent="Welcome to JavaScript Class!!!!!!!!"
            document.body.appendChild(para)
        }
        function img(){
            let img=document.createElement('img')
            img.src=('https://tse1.explicit.bing.net/th/id/OIF.YMmL6jTkRm3Rg5noOZh7wA?rs=1&pid=ImgDetMain&o=7&rm=3')
            document.body.appendChild(img)
        }

    </script>
</body>
</html>
