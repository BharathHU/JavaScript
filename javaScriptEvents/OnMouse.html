<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{
        background-color: red;
        height: 300;
        width: 300;
    }
</style>
<body>
    <div onmouseover="MouseOut()" onmouseout="MouseOut()" id="one"></div>
    <script>
        function MouseOver(){
            let divref=document.getElementById('one')
            divref.style.backgroundColor="blue"
        }
         function MouseOut(){
            let divref=document.getElementById('one')
            divref.style.backgroundColor="Orange"
            divref.style.borderRadius="50%"
        }
    </script>
</body>
</html>
