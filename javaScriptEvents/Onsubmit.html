<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            background-color: aquamarine;
            font-style: italic;
            /* animation-name: ani;
            animation-duration: 6s;
            animation-iteration-count: infinite;
            animation-direction: alternate; */
        }
        #btn{
            background-color: white;
            border-radius: 5px;
            
        }
        @keyframes ani{
            0%{
                background-image: url(https://images.pexels.com/photos/247478/pexels-photo-247478.jpeg?cs=srgb&dl=clouds-cloudy-conifers-247478.jpg&fm=jpg);
                color: red;
                font-style: normal;

                
            }
            25%{
                background-image: url(https://images.pexels.com/photos/210186/pexels-photo-210186.jpeg?cs=srgb&dl=cascade-clouds-cool-wallpaper-210186.jpg&fm=jpg);
                color: white;
                background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
            }
            50%{
               background-image:url(https://www.thewowstyle.com/wp-content/uploads/2015/01/images-of-nature-4.jpg);
                color: black;
                background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
            }
            75%{
                background-image:url(https://i0.wp.com/picjumbo.com/wp-content/uploads/beautiful-nature-mountain-scenery-with-flowers-free-photo.jpg?w=2210&quality=70) ;
                color: darkblue;
                background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
            }
            100%{
                background-image: url(https://tse4.mm.bing.net/th/id/OIP.Eg3Iu4rLjCR_RTxFJ7JCCwHaE8?pid=ImgDet&w=474&h=316&rs=1&o=7&rm=3);
                color: brown;
                background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
            }
        }
        .box1{
            height: 400px;
            width: 400px;
            border-radius: 50%;
            border: 5px solid whitesmoke;
            box-shadow: 0px 0px 5px 2px;
            text-align: center;
            background-color: greenyellow;
            animation-name: ani;
            animation-duration: 6s;
            animation-iteration-count: infinite;
            animation-direction: alternate;
        }
        .box1:hover{
    transform: scale(1.2);
    background-image: url(https://images.pexels.com/photos/247478/pexels-photo-247478.jpeg?cs=srgb&dl=clouds-cloudy-conifers-247478.jpg&fm=jpg);
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;

        }

    </style>
</head>
<body>
    <center>
        <h1>Form Validation</h1>
        <form id="myForm">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <input type="submit" value="Submit" id="btn">
        </form>
    </center>

    <script>
        document.getElementById('myForm').addEventListener('submit', function(event) {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (name === '' || email === '' || password === '') {
                event.preventDefault();
                alert('Please fill in all fields.');
            }
            else {
                alert('Form submitted successfully!');
            }
        });
    </script>
    <div class="box1">box1
    </div>
</body>
</html>
