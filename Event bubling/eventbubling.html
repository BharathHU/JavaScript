<!-- Event Bubbling

<!-- *Event bubbling is a mechanism in JavaScript where an event starts from the deepest target element means the event trigger first on child element or clicked element and then moves upward to its paent elements.
*in event bubbling event direction will be from child to parent.
*we can stop event bubbling by using stopPropagation() method. -->

<!-- -why does event bubbling happen?
*javascript  -->

<!-- *javascript uses event propagation
*makes event delegation possible
*reduces number of event listeners in the application
*improves performance of the appllication -->


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Bubbling</title>

<style>
#parent {
    width: 200px;
    height: 200px;
    background-color: lightblue;
    display: flex;
    justify-content: center;
    align-items: center;
}
#parent:hover{
    background-color: yellow;
    border: 30px;
    border-color: 15px solid pink;
}
#btn {
    padding: 10px 20px;
    font-size: 16px;
}
#btn:active{
    background-color: pink;
    border-radius: 30px;
    border: whitesmoke;
    transform: scale(1.2);
}
#head:hover{
    color: rgb(243, 7, 46);
    transform:scale(1.2);
}
    
    #head{
         animation-name: ani;
    animation-duration: 8s;
    animation-iteration-count: infinite;
    }

 @keyframes ani {
            0% {
                background-color: yellowgreen;
                border-color: gold;
            }
            25% {
                background-color: aqua;
                border-color: burlywood;
            }
            50% {
                background-color: pink;
                border-color: chartreuse;
            }
            75% {
                background-color: brown;
                border-color: chocolate;
            }
            100% {
                background-color: blue;
            }
        }
</style>

</head>
<body>

<h1 id="head">* Example for Event Bubbling</h1>

<div id="parent">
    <button id="btn">Click Me</button>
</div>

<script>
document.getElementById('btn').addEventListener('click', (event) => {
    alert("Child button clicked");
    // stop bubbling here
    event.stopPropagation();

    
});

document.getElementById('parent').addEventListener('click', () => {
    alert("Parent clicked");
});
</script>

</body>
</html>
