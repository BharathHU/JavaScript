<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #btn1{
            background-color: yellow;
            border: 2px solid rgb(249, 10, 10);
            margin-right: 40px;
        }
        #btn2{
            background-color: red;
            border: 2px solid rgb(8, 12, 240);
             margin-right: 40px;
        }
        #btn3{
            background-color: greenyellow;
            border: 2px solid red ;
             margin-right: 40px;
        }
        #btn1:hover{
            transform: scale(1.2);
            background-color: whitesmoke;
            color: black;
        }
    </style>
</head>
<body>
    <div class="parent">
        <button id="btn1" onclick="notify()">Click1</button>
        <button id="btn2" onclick="notify()">Click2</button>
        <button id="btn3" onclick="notify()">Click3</button>
    </div>
    <script>
        let noti=document.getElementById('btn1')
        noti.addEventListener( 'click',function(){
            alert("Good morning")
        })
        let notiref2=document.getElementById('btn2')
        notiref2.addEventListener( 'click',function(){
            alert("Good morning")
        })
        let notiref3=document.getElementById('btn3')
        notiref3.addEventListener( 'click',function(){
            alert("Good morning")
        })
    </script>
</body>
</html>
