<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation + Animation</title>

    <style>
        h1 {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid black;
            font-family: monospace;
            display: inline-block;
            animation: blink 0.7s step-end infinite alternate,
                       move 10s linear infinite;
        }

        /* Cursor blinking */
        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }

        /* Moving animation */
        @keyframes move {
            0% {
                transform: translateX(-0%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* Parent container */
        #parent {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            width: 400px;
            height: 400px;
            border: 10px solid goldenrod;
            animation: ani 6s infinite;
        }

        #parent:hover {
            background-color: yellow;
        }

        /* Button styling */
        button {
            margin: 10px;
            width: 100px;
            height: 50px;
            background-color: lightblue;
            border: 2px solid burlywood;
            border-radius: 9px;
            cursor: pointer;
        }

        button:hover {
            transform: scale(1.2);
            background-color: pink;
            border-radius: 20px;
            box-shadow: 0px 0px 5px;
        }

        /* Parent animation */
        @keyframes ani {
            0% {
                background-color: yellowgreen;
                border-color: gold;
            }
            25% {
                background-color: aqua;
                border-color: burlywood;
            }
            50% {
                background-color: pink;
                border-color: chartreuse;
            }
            75% {
                background-color: brown;
                border-color: chocolate;
            }
            100% {
                background-color: blue;
            }
        }
    </style>
</head>

<body>

    <!-- Animated Heading -->
    <h1 id="animatedText"></h1>

    <!-- Event Delegation -->
    <div id="parent">
        <button class="btn">click 1</button>
        <button class="btn">click 2</button>
        <button class="btn">click 3</button> 
        <button class="btn">click 4</button>
        <button class="btn">click 5</button>
    </div>

    <script>
        // Event Delegation
        document.getElementById('parent').addEventListener('click', (event) => {
            if (event.target.classList.contains('btn')) {
                alert("Good morning " + event.target.innerText);
            }
        });

        // Word-by-word typing effect
        const text = "With using Event delegation";
        const words = text.split(" ");
        const h1 = document.getElementById("animatedText");

        let index = 0;

        function typeWord() {
            if (index < words.length) {
                h1.innerHTML += words[index] + " ";
                index++;
                setTimeout(typeWord, 400);
            }
        }

        // Start typing
        typeWord();
    </script>

</body>
</html>
